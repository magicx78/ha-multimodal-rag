[pytest]
asyncio_mode = auto
testpaths = custom_components/multimodal_rag/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -v
markers =
    asyncio: Mark test as async
    integration: Mark test as integration test (may require external services)
    unit: Mark test as unit test (no external dependencies)
log_cli = true
log_cli_level = WARNING
