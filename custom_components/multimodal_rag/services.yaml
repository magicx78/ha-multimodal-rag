upload_document:
  name: Upload Document
  description: >
    Upload and index a document into the Multimodal RAG knowledge base.
    Supports text files, PDFs, and images. The document is processed,
    chunked, embedded, and stored in the vector database.
  fields:
    file_path:
      name: File Path
      description: Absolute path to the document file on the Home Assistant host.
      required: true
      example: "/config/documents/my_manual.pdf"
      selector:
        text: {}
    collection:
      name: Collection
      description: Target collection name. Uses the default collection if not specified.
      required: false
      default: "documents"
      example: "home_manuals"
      selector:
        text: {}
    metadata:
      name: Metadata
      description: Additional key-value metadata to store with the document (optional).
      required: false
      example:
        category: "appliances"
        language: "en"
      selector:
        object: {}

search:
  name: Search Documents
  description: >
    Perform a semantic similarity search over indexed documents.
    Returns the most relevant document chunks with similarity scores.
  fields:
    query:
      name: Search Query
      description: Natural language search query.
      required: true
      example: "How do I reset the washing machine?"
      selector:
        text: {}
    collection:
      name: Collection
      description: Collection to search in. Uses default if not specified.
      required: false
      default: "documents"
      selector:
        text: {}
    top_k:
      name: Number of Results
      description: Maximum number of results to return (1–50).
      required: false
      default: 5
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: box
    score_threshold:
      name: Score Threshold
      description: Minimum similarity score (0.0–1.0). Higher = stricter.
      required: false
      default: 0.0
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider

reason:
  name: Reason over Documents
  description: >
    Ask a question and receive an LLM-generated answer based on the
    most relevant documents in the knowledge base. Combines semantic
    search with language model reasoning.
  fields:
    query:
      name: Question
      description: The question to answer using your document knowledge base.
      required: true
      example: "What is the maximum load for my dishwasher?"
      selector:
        text:
          multiline: true
    collection:
      name: Collection
      description: Collection to search in. Uses default if not specified.
      required: false
      default: "documents"
      selector:
        text: {}
    top_k:
      name: Context Documents
      description: Number of document chunks to use as context for reasoning (1–20).
      required: false
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: box
    score_threshold:
      name: Score Threshold
      description: Minimum similarity score for context documents.
      required: false
      default: 0.0
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider

list_collections:
  name: List Collections
  description: >
    List all document collections available in the vector database.

delete_document:
  name: Delete Document
  description: >
    Remove a document and all its chunks from the vector database.
    Use the document_id returned by the upload_document service.
  fields:
    document_id:
      name: Document ID
      description: The unique document identifier returned by upload_document.
      required: true
      example: "a3f8b2c14d7e9012"
      selector:
        text: {}
    collection:
      name: Collection
      description: Collection containing the document. Uses default if not specified.
      required: false
      default: "documents"
      selector:
        text: {}
